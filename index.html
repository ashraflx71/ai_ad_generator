<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الإعلانات الذكي 🎯</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E60000;
            --primary-dark: #B30000;
            --primary-light: #FF3333;
            --accent: #FFD700;
            --bg: #0F0F0F;
            --surface: #1A1A1A;
            --surface-light: #252525;
            --text: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #333333;
            --success: #22C55E;
            --error: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Card */
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
            font-size: 1rem;
        }

        .form-label .required {
            color: var(--primary-light);
            margin-right: 0.25rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--surface-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.2);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-secondary);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* API Key Section */
        .api-section {
            background: linear-gradient(135deg, rgba(230,0,0,0.1) 0%, rgba(26,26,26,1) 100%);
            border: 1px solid rgba(230,0,0,0.3);
        }

        .api-link {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .api-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .api-note {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        /* Tone Selector */
        .tone-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        @media (min-width: 600px) {
            .tone-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .tone-option {
            position: relative;
        }

        .tone-option input {
            position: absolute;
            opacity: 0;
        }

        .tone-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--surface-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tone-label .emoji {
            font-size: 1.5rem;
        }

        .tone-label .tone-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .tone-option input:checked + .tone-label {
            border-color: var(--primary);
            background: rgba(230, 0, 0, 0.1);
            box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.2);
        }

        .tone-option input:focus + .tone-label {
            box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.3);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-loading {
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spinner 0.8s linear infinite;
        }

        @keyframes spinner {
            to { transform: rotate(360deg); }
        }

        /* Output Section */
        .output-section {
            display: none;
        }

        .output-section.active {
            display: block;
        }

        .output-box {
            background: var(--surface-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
        }

        .output-text {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .copy-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* History */
        .history-item {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .history-item:hover {
            border-color: var(--primary);
            transform: translateX(-4px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .history-product {
            font-weight: 700;
            color: var(--accent);
        }

        .history-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .history-content {
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Alert */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
        }

        .alert.show {
            display: flex;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.75rem;
            }

            .card {
                padding: 1.25rem;
            }

            .tone-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>🎯 مولد الإعلانات الذكي</h1>
        <p>أنشئ إعلانات احترافية بالذكاء الاصطناعي في ثوانٍ</p>
    </header>

    <div class="container">
        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- API Key Section -->
        <div class="card api-section">
            <div class="card-title">🔑 مفتاح API</div>
            <div class="form-group">
                <label class="form-label">
                    أدخل مفتاح Google Gemini API
                </label>
                <input 
                    type="password" 
                    id="apiKey" 
                    class="form-input" 
                    placeholder="مفتاح API الخاص بك..."
                >
                <p class="api-note">
                    احصل على مفتاحك المجاني من 
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="api-link">Google AI Studio</a>
                    — المفتاح يُحفظ في المتصفح فقط
                </p>
            </div>
        </div>

        <!-- Ad Form -->
        <div class="card">
            <div class="card-title">📝 بيانات الإعلان</div>

            <div class="form-group">
                <label class="form-label">
                    اسم المنتج أو الخدمة <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="productName" 
                    class="form-input" 
                    placeholder="مثال: فودافون كاش"
                >
            </div>

            <div class="form-group">
                <label class="form-label">الجمهور المستهدف</label>
                <input 
                    type="text" 
                    id="targetAudience" 
                    class="form-input" 
                    placeholder="مثال: شباب 18-35 سنة"
                >
            </div>

            <div class="form-group">
                <label class="form-label">المنصة</label>
                <select id="platform" class="form-select">
                    <option value="">اختر المنصة...</option>
                    <option value="facebook">فيسبوك</option>
                    <option value="instagram">إنستغرام</option>
                    <option value="twitter">تويتر / إكس</option>
                    <option value="tiktok">تيك توك</option>
                    <option value="linkedin">لينكدإن</option>
                    <option value="instapay">إنستا باي</option>
                    <option value="whatsapp">واتساب</option>
                    <option value="general">عام</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">نبرة الإعلان</label>
                <div class="tone-grid">
                    <div class="tone-option">
                        <input type="radio" name="tone" id="professional" value="professional" checked>
                        <label for="professional" class="tone-label">
                            <span class="emoji">💼</span>
                            <span class="tone-name">احترافي</span>
                        </label>
                    </div>
                    <div class="tone-option">
                        <input type="radio" name="tone" id="casual" value="casual">
                        <label for="casual" class="tone-label">
                            <span class="emoji">😊</span>
                            <span class="tone-name">عفوي</span>
                        </label>
                    </div>
                    <div class="tone-option">
                        <input type="radio" name="tone" id="funny" value="funny">
                        <label for="funny" class="tone-label">
                            <span class="emoji">😂</span>
                            <span class="tone-name">فكاهي</span>
                        </label>
                    </div>
                    <div class="tone-option">
                        <input type="radio" name="tone" id="persuasive" value="persuasive">
                        <label for="persuasive" class="tone-label">
                            <span class="emoji">🔥</span>
                            <span class="tone-name">إقناعي</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">تفاصيل إضافية (اختياري)</label>
                <textarea 
                    id="extraDetails" 
                    class="form-textarea" 
                    placeholder="أضف أي تفاصيل إضافية مثل السعر، العروض، رقم التواصل..."
                ></textarea>
            </div>

            <button id="generateBtn" class="btn" onclick="generateAd()">
                ✨ إنشاء الإعلان
            </button>
        </div>

        <!-- Output Section -->
        <div id="outputSection" class="card output-section">
            <div class="card-title">✅ الإعلان المُنشأ</div>
            <div class="output-box">
                <button class="copy-btn" onclick="copyOutput()">📋 نسخ</button>
                <div id="outputText" class="output-text"></div>
            </div>
        </div>

        <!-- History Section -->
        <div class="card">
            <div class="card-title">📚 سجل الإعلانات</div>
            <div id="historyList">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <p>لم يتم إنشاء أي إعلانات بعد</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>مولد الإعلانات الذكي © 2026 | صُنع بحب ❤️</p>
    </footer>

    <script>
        // Load API key from localStorage
        document.getElementById('apiKey').value = localStorage.getItem('gemini_api_key') || '';

        // Save API key on change
        document.getElementById('apiKey').addEventListener('change', function() {
            localStorage.setItem('gemini_api_key', this.value);
        });

        // Load history from localStorage
        let adHistory = JSON.parse(localStorage.getItem('ad_history') || '[]');
        renderHistory();

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        function setLoading(loading) {
            const btn = document.getElementById('generateBtn');
            if (loading) {
                btn.disabled = true;
                btn.classList.add('btn-loading');
                btn.textContent = '';
            } else {
                btn.disabled = false;
                btn.classList.remove('btn-loading');
                btn.textContent = '✨ إنشاء الإعلان';
            }
        }

        async function generateAd() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const targetAudience = document.getElementById('targetAudience').value.trim();
            const platform = document.getElementById('platform').value;
            const tone = document.querySelector('input[name="tone"]:checked').value;
            const extraDetails = document.getElementById('extraDetails').value.trim();

            // Validation
            if (!apiKey) {
                showAlert('❌ يرجى إدخال مفتاح API');
                document.getElementById('apiKey').focus();
                return;
            }

            if (!productName) {
                showAlert('❌ يرجى إدخال اسم المنتج أو الخدمة');
                document.getElementById('productName').focus();
                return;
            }

            setLoading(true);

            const toneMap = {
                professional: 'احترافي ورسمي',
                casual: 'عفوي وودود',
                funny: 'فكاهي ومرح',
                persuasive: 'إقناعي وحماسي'
            };

            const platformMap = {
                facebook: 'فيسبوك',
                instagram: 'إنستغرام',
                twitter: 'تويتر',
                tiktok: 'تيك توك',
                linkedin: 'لينكدإن',
                instapay: 'إنستا باي',
                whatsapp: 'واتساب',
                general: 'عام'
            };

            const prompt = `أنشئ إعلانًا تسويقيًا احترافيًا باللغة العربية للمنتج/الخدمة التالية:

اسم المنتج: ${productName}
${targetAudience ? `الجمهور المستهدف: ${targetAudience}` : ''}
${platform ? `المنصة: ${platformMap[platform] || platform}` : ''}
النبرة: ${toneMap[tone] || tone}
${extraDetails ? `تفاصيل إضافية: ${extraDetails}` : ''}

المتطلبات:
- اكتب الإعلان بأسلوب جذاب ومقنع
- اجعله مناسبًا للمنصة المحددة
- اكتب باللغة العربية الفصحى
- قسّم الإعلان إلى: عنوان رئيسي + نص الإعلان + دعوة للعمل (CTA)
- لا تستخدم أي رموز تنسيق مثل ** أو ##
- اجعل الإعلان قصيرًا وقويًا (3-5 أسطر)`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `خطأ HTTP: ${response.status}`);
                }

                const data = await response.json();
                const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

                if (!generatedText) {
                    throw new Error('لم يتم استلام رد من الذكاء الاصطناعي');
                }

                // Display output
                document.getElementById('outputText').textContent = generatedText;
                document.getElementById('outputSection').classList.add('active');

                // Save to history
                const historyItem = {
                    product: productName,
                    platform: platformMap[platform] || platform || 'عام',
                    tone: toneMap[tone] || tone,
                    content: generatedText,
                    date: new Date().toLocaleString('ar-EG')
                };

                adHistory.unshift(historyItem);
                if (adHistory.length > 10) adHistory = adHistory.slice(0, 10);
                localStorage.setItem('ad_history', JSON.stringify(adHistory));
                renderHistory();

                showAlert('✅ تم إنشاء الإعلان بنجاح!', 'success');

            } catch (error) {
                console.error('Error:', error);
                showAlert(`❌ خطأ: ${error.message || 'فشل في الاتصال بالخادم'}`);
            } finally {
                setLoading(false);
            }
        }

        function copyOutput() {
            const text = document.getElementById('outputText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showAlert('✅ تم نسخ الإعلان!', 'success');
            }).catch(() => {
                showAlert('❌ فشل في النسخ');
            });
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');

            if (adHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>لم يتم إنشاء أي إعلانات بعد</p>
                    </div>
                `;
                return;
            }

            historyList.innerHTML = adHistory.map((item, index) => `
                <div class="history-item">
                    <div class="history-header">
                        <span class="history-product">${escapeHtml(item.product)}</span>
                        <span class="history-date">${escapeHtml(item.date)}</span>
                    </div>
                    <div style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.5rem;">
                        ${escapeHtml(item.platform)} | ${escapeHtml(item.tone)}
                    </div>
                    <div class="history-content">${escapeHtml(item.content)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle Enter key in form
        document.querySelectorAll('.form-input, .form-select, .form-textarea').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    generateAd();
                }
            });
        });
    </script>
</body>
</html>
